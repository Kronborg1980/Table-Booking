<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skansagadur - Dining Allocation</title>
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.95);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #0ea5e9;
            --occupied-bg: #10b981;
            --occupied-text: #022c22;
            --surface: #e2e8f0;
            --chair: #64748b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex;
            background: #0f172a; color: var(--text); overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 340px; background: var(--glass-bg); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 25px; z-index: 50; box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }

        h2 { margin: 0 0 5px 0; font-size: 24px; font-weight: 300; }
        .subtitle { font-size: 11px; color: #94a3b8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        textarea {
            width: 100%; height: 300px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            color: white; padding: 15px; border-radius: 6px; font-family: monospace; resize: none; outline: none; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--accent); }

        button {
            width: 100%; padding: 15px; background: var(--accent); color: #0f172a; border: none;
            border-radius: 6px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.2s;
        }
        button:hover { background: #38bdf8; box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }

        .error-log { margin-top: 15px; padding: 15px; background: rgba(239, 68, 68, 0.15); border-left: 4px solid #ef4444; border-radius: 4px; font-size: 13px; display: none; }

        /* Workspace */
        #workspace { flex-grow: 1; overflow: auto; position: relative; }
        #canvas { width: 2000px; height: 1500px; position: relative; }

        /* Render Nodes */
        .table-node { position: absolute; display: flex; align-items: center; justify-content: center; transform-origin: center center; }
        
        .surface {
            background: var(--surface); color: #0f172a; border: 2px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; z-index: 10; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .is-window .surface { border-color: var(--accent); }
        .chair { position: absolute; background: var(--chair); border: 1px solid #334155; border-radius: 50%; width: 14px; height: 14px; z-index: 5; transition: 0.3s; }

        /* Occupied State */
        .table-node.occupied .surface { background: var(--occupied-bg); color: var(--occupied-text); border-color: #047857; cursor: pointer; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .table-node.occupied .chair { background: var(--occupied-bg); border-color: #047857; }
        .table-node.occupied:hover { z-index: 100; transform: scale(1.05) !important; }
        
        .guest-name { font-size: 10px; font-weight: bold; white-space: nowrap; margin-top: 2px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Captain's Roster</h2>
    <div class="subtitle">Format: Name, Guests, Window (Y/N)</div>
    <textarea id="bookingInput" placeholder="Soren Jensen, 4, Y&#10;Marni Larsen, 2, N"></textarea>
    <button onclick="executeAllocation()">Launch Protocol</button>
    <div id="unseated" class="error-log"></div>
</div>

<div id="workspace">
    <div id="canvas"></div>
</div>

<script>
    let deck = JSON.parse(localStorage.getItem('skansagadur_manifest_2025')) || [];
    let allocations = new Map();

    function renderDeck() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';

        if(deck.length === 0) {
            canvas.innerHTML = "<h3 style='color:#64748b; margin: 50px;'>No deck manifest found. Please build the layout in Architect.</h3>";
            return;
        }

        deck.forEach(t => {
            const node = document.createElement('div');
            node.className = `table-node ${t.win ? 'is-window' : ''}`;
            node.id = `t-${t.id}`;
            node.style.left = `${t.x}px`;
            node.style.top = `${t.y}px`;
            
            // Mathematical Geometry Renderer (Matches Admin)
            let surfaceW, surfaceH, br, chairsHTML = '';
            if (t.shape === 'square' || t.shape === 'rect') {
                br = '6px';
                if (t.seats === 2) { surfaceW = 40; surfaceH = 40; }
                if (t.seats === 4) { surfaceW = 56; surfaceH = 50; }
                if (t.seats === 6) { surfaceW = 80; surfaceH = 50; }

                const spacing = 22; 
                const startX = (surfaceW - (t.seats/2 * spacing)) / 2 + 4;
                for(let i=0; i < t.seats/2; i++) {
                    const cx = startX + (i * spacing);
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:-8px;"></div><div class="chair" style="left:${cx}px; bottom:-8px;"></div>`;
                }
            } else if (t.shape === 'round') {
                br = '50%';
                surfaceW = t.seats === 8 ? 70 : (t.seats === 6 ? 60 : 50); surfaceH = surfaceW;
                const radius = (surfaceW / 2) + 4; const center = (surfaceW / 2) - 7;
                for(let i=0; i < t.seats; i++) {
                    const angle = (i * (360 / t.seats)) * (Math.PI / 180);
                    const cx = center + radius * Math.cos(angle); const cy = center + radius * Math.sin(angle);
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:${cy}px;"></div>`;
                }
            }

            node.style.width = `${surfaceW}px`; node.style.height = `${surfaceH}px`;
            node.style.transform = `rotate(${t.rotation || 0}deg)`;

            const guest = allocations.get(t.id);
            if(guest) {
                node.classList.add('occupied');
                node.innerHTML = `
                    ${chairsHTML}
                    <div class="surface" style="width:100%; height:100%; border-radius:${br};">
                        <span style="transform: rotate(-${t.rotation || 0}deg); display:flex; flex-direction:column; align-items:center;">
                            ${t.id}<div class="guest-name">${guest.name}</div>
                        </span>
                    </div>
                `;
                node.title = `Click to re-assign ${guest.name}`;
                node.onclick = () => manualReassign(t.id);
            } else {
                node.innerHTML = `
                    ${chairsHTML}
                    <div class="surface" style="width:100%; height:100%; border-radius:${br};">
                        <span style="transform: rotate(-${t.rotation || 0}deg);">${t.id}</span>
                    </div>
                `;
            }
            canvas.appendChild(node);
        });
    }

    function executeAllocation() {
        allocations.clear();
        const text = document.getElementById('bookingInput').value.trim();
        const guests = text.split('\n').map(l => {
            const p = l.split(',');
            return { name: p[0]?.trim(), size: parseInt(p[1]), win: p[2]?.trim().toUpperCase() === 'Y' };
        }).filter(g => g.name && !isNaN(g.size));

        guests.sort((a, b) => (b.win - a.win) || (b.size - a.size));
        let failed = [];

        guests.forEach(g => {
            let match = deck.find(t => !allocations.has(t.id) && t.seats >= g.size && (g.win ? t.win : true));
            if (!match && g.win) match = deck.find(t => !allocations.has(t.id) && t.seats >= g.size);

            if (match) allocations.set(match.id, g);
            else failed.push(`${g.name} (${g.size})`);
        });

        const errPanel = document.getElementById('unseated');
        if (failed.length > 0) {
            errPanel.style.display = 'block';
            errPanel.innerHTML = `<strong>Attention: Unseated Guests</strong><br>• ` + failed.join('<br>• ');
        } else errPanel.style.display = 'none';

        renderDeck();
    }

    function manualReassign(currentId) {
        const guest = allocations.get(currentId);
        const newId = prompt(`Override Assignment for ${guest.name}\nEnter New Table ID:`);
        if(!newId) return;

        const target = deck.find(t => t.id === newId);
        if(!target) return alert(`Table ${newId} does not exist.`);
        if(allocations.has(newId)) return alert(`Table ${newId} is occupied.`);
        if(target.seats < guest.size && !confirm(`Overcapacity Warning: Moving ${guest.size} people to a ${target.seats}-seat table. Proceed?`)) return;

        allocations.delete(currentId);
        allocations.set(newId, guest);
        renderDeck();
    }

    renderDeck();
</script>
</body>
</html>
