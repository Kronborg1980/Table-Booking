<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Commander</title>
    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.95);
            --border-glass: rgba(255, 255, 255, 0.2);
            --accent: #38bdf8;
            --occupied-bg: #10b981;
            --occupied-text: #064e3b;
            --text-main: #f8fafc;
            --table-bg: #e2e8f0;
            --chair-bg: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; height: 100vh; display: flex;
            background: #1e293b; 
            color: var(--text-main); overflow: hidden;
        }

        #sidebar {
            width: 340px; background: var(--bg-glass);
            border-right: 1px solid var(--border-glass); padding: 25px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }

        h2 { margin: 0; font-size: 22px; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px; }

        textarea {
            width: 100%; height: 250px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-glass); color: #fff; padding: 15px;
            border-radius: 8px; font-family: monospace; resize: none; box-sizing: border-box; outline: none;
        }

        button { background: var(--accent); color: #0f172a; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .error-log { margin-top: 10px; padding: 15px; background: rgba(239, 68, 68, 0.2); border-left: 4px solid #ef4444; border-radius: 4px; font-size: 13px; display: none; }

        #map-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #0f172a; }
        
        #canvas {
            width: 1000px; height: 850px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; position: relative;
        }

        /* --- VISUAL TABLE SYSTEM --- */
        .table-wrapper { position: absolute; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; transition: all 0.3s ease; }

        .table-core {
            background: var(--table-bg); color: #0f172a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 12px; font-weight: bold;
            z-index: 2; border: 2px solid #334155; text-align: center; line-height: 1.1;
        }
        .is-window .table-core { border-color: var(--accent); }
        .chair { position: absolute; background: var(--chair-bg); border: 1px solid #475569; border-radius: 50%; width: 14px; height: 14px; z-index: 1; transition: 0.3s; }

        /* Occupied States */
        .table-wrapper.occupied .table-core { background: var(--occupied-bg); color: var(--occupied-text); border-color: #047857; cursor: pointer; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .table-wrapper.occupied .chair { background: var(--occupied-bg); border-color: #047857; }
        .table-wrapper.occupied:hover { transform: scale(1.1); z-index: 50; }
        
        .guest-name { font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; max-width: 90%; white-space: nowrap; margin-top: 2px; }

        /* Fixed Geometry for Layouts */
        .layout-square-4 .table-core { width: 40px; height: 40px; border-radius: 4px; }
        .layout-square-4 .c-top { top: 2px; left: 28px; } 
        .layout-square-4 .c-bot { bottom: 2px; left: 28px; } 
        .layout-square-4 .c-left { left: 2px; top: 28px; } 
        .layout-square-4 .c-right { right: 2px; top: 28px; }

        .layout-square-2 .table-core { width: 36px; height: 36px; border-radius: 4px; }
        .layout-square-2 .c-left { left: 4px; top: 28px; } 
        .layout-square-2 .c-right { right: 4px; top: 28px; }

        .layout-circle-6 .table-core { width: 46px; height: 46px; border-radius: 50%; }
        .layout-circle-6 .c-1 { top: 6px; left: 14px; } 
        .layout-circle-6 .c-2 { top: 6px; right: 14px; } 
        .layout-circle-6 .c-3 { top: 28px; left: 0px; }
        .layout-circle-6 .c-4 { top: 28px; right: 0px; } 
        .layout-circle-6 .c-5 { bottom: 6px; left: 14px; } 
        .layout-circle-6 .c-6 { bottom: 6px; right: 14px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Captain's Roster</h2>
    <p style="font-size: 12px; color: #cbd5e1; margin: 0;">Format: <strong>Name, Party Size, Window (Y/N)</strong></p>
    <textarea id="bookingInput" placeholder="Soren Jensen, 4, Y&#10;Marni Larsen, 2, N"></textarea>
    <button onclick="executeSeating()">Allocate Tables</button>
    <div id="unseated" class="error-log"></div>
</div>

<div id="map-area">
    <div id="canvas"></div>
</div>

<script>
    let layout = JSON.parse(localStorage.getItem('shipDataMap2025')) || [];
    let activeAllocations = new Map();

    function initDeck() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';

        if(layout.length === 0) {
            canvas.innerHTML = "<h3 style='color:white; text-align:center; margin-top:200px;'>No tables found. Please build layout in admin.html</h3>";
            return;
        }

        layout.forEach(t => {
            const wrapper = document.createElement('div');
            wrapper.className = `table-wrapper layout-${t.layout} ${t.win ? 'is-window' : ''}`;
            wrapper.id = `table-${t.id}`;
            wrapper.style.left = t.x + 'px';
            wrapper.style.top = t.y + 'px';
            
            let chairHTML = '';
            if(t.layout === 'square-4') chairHTML = `<div class="chair c-top"></div><div class="chair c-bot"></div><div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'square-2') chairHTML = `<div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'circle-6') chairHTML = `<div class="chair c-1"></div><div class="chair c-2"></div><div class="chair c-3"></div><div class="chair c-4"></div><div class="chair c-5"></div><div class="chair c-6"></div>`;

            const booking = activeAllocations.get(t.id);
            if(booking) {
                wrapper.classList.add('occupied');
                wrapper.innerHTML = `${chairHTML}<div class="table-core">${t.id}<div class="guest-name">${booking.name}</div></div>`;
                wrapper.title = `Click to re-assign ${booking.name}`;
                wrapper.onclick = () => manualReassign(t.id);
            } else {
                wrapper.innerHTML = `${chairHTML}<div class="table-core">${t.id}<br><span style="font-size:9px; font-weight:normal; opacity:0.7">${t.cap} empty</span></div>`;
            }
            canvas.appendChild(wrapper);
        });
    }

    function executeSeating() {
        activeAllocations.clear();
        const lines = document.getElementById('bookingInput').value.trim().split('\n');
        
        let guests = lines.map(line => {
            const parts = line.split(',');
            return { name: parts[0]?.trim(), size: parseInt(parts[1]), winReq: parts[2]?.trim().toUpperCase() === 'Y' };
        }).filter(g => g.name && !isNaN(g.size));

        guests.sort((a, b) => (b.winReq - a.winReq) || (b.size - a.size));
        let failedToSeat = [];

        guests.forEach(guest => {
            let match = layout.find(t => !activeAllocations.has(t.id) && t.cap >= guest.size && (guest.winReq ? t.win : true));
            if (!match && guest.winReq) match = layout.find(t => !activeAllocations.has(t.id) && t.cap >= guest.size);

            if (match) activeAllocations.set(match.id, guest);
            else failedToSeat.push(`${guest.name} (${guest.size})`);
        });

        const errorPanel = document.getElementById('unseated');
        if (failedToSeat.length > 0) {
            errorPanel.style.display = 'block';
            errorPanel.innerHTML = `<strong>Requires Attention:</strong><br>Could not seat:<br>• ` + failedToSeat.join('<br>• ');
        } else {
            errorPanel.style.display = 'none';
        }
        initDeck();
    }

    function manualReassign(currentTableId) {
        const guestData = activeAllocations.get(currentTableId);
        const newTarget = prompt(`Moving ${guestData.name} (Party of ${guestData.size})\nEnter new Table ID Number:`);
        if (!newTarget) return;

        const tableProfile = layout.find(t => t.id === newTarget);
        if (!tableProfile) return alert(`Table ${newTarget} does not exist on map.`);
        if (activeAllocations.has(newTarget)) return alert(`Table is already occupied.`);

        if (tableProfile.cap < guestData.size) {
            if(!confirm(`Warning: Overcapacity! Moving ${guestData.size} guests to a ${tableProfile.cap}-seat table. Proceed?`)) return;
        }

        activeAllocations.delete(currentTableId);
        activeAllocations.set(newTarget, guestData);
        initDeck();
    }

    initDeck();
</script>
</body>
</html>
