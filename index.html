<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Booking Commander</title>
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #38bdf8;
            --occupied-bg: #10b981;
            --occupied-text: #064e3b;
            --text-main: #f8fafc;
            --table-color: #e2e8f0;
            --chair-color: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; height: 100vh; display: flex;
            background: url('https://www.smyrilline.dk/wp-content/uploads/2025/04/Norrona.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main); overflow: hidden;
        }

        #sidebar {
            width: 360px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); padding: 30px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }

        h2 { margin: 0; font-size: 22px; font-weight: 300; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }

        textarea {
            width: 100%; height: 250px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); color: #fff; padding: 15px;
            border-radius: 8px; font-family: monospace; resize: none; box-sizing: border-box; outline: none;
        }

        button {
            background: var(--accent); color: #0f172a; padding: 15px; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .error-log { margin-top: 15px; padding: 15px; background: rgba(239, 68, 68, 0.2); border-left: 4px solid #ef4444; border-radius: 4px; font-size: 13px; display: none; }

        #map-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #canvas {
            width: 1000px; height: 900px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; position: relative;
        }

        /* --- VISUAL TABLE SYSTEM --- */
        .table-wrapper {
            position: absolute; display: flex; align-items: center; justify-content: center;
            width: 70px; height: 70px; transition: all 0.3s ease;
        }

        .table-core {
            background: var(--table-color); color: #0f172a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 12px; font-weight: bold;
            z-index: 2; border: 2px solid #334155; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center; line-height: 1.1;
        }
        
        .is-window .table-core { border-color: var(--accent); }

        .chair { position: absolute; background: var(--chair-color); border: 1px solid #475569; border-radius: 50%; width: 12px; height: 12px; z-index: 1; transition: 0.3s; }

        /* Occupied States */
        .table-wrapper.occupied .table-core { background: var(--occupied-bg); color: var(--occupied-text); border-color: #047857; cursor: pointer; }
        .table-wrapper.occupied .chair { background: var(--occupied-bg); border-color: #047857; }
        .table-wrapper.occupied:hover { transform: scale(1.1); z-index: 50; }
        
        .guest-name { font-size: 9px; font-weight: normal; overflow: hidden; text-overflow: ellipsis; max-width: 90%; white-space: nowrap; }

        /* Layouts */
        .layout-square-4 .table-core { width: 36px; height: 36px; border-radius: 4px; }
        .layout-square-4 .c-top { top: 2px; } .layout-square-4 .c-bot { bottom: 2px; } .layout-square-4 .c-left { left: 2px; } .layout-square-4 .c-right { right: 2px; }

        .layout-square-2 .table-core { width: 32px; height: 32px; border-radius: 4px; }
        .layout-square-2 .c-left { left: 4px; } .layout-square-2 .c-right { right: 4px; }

        .layout-circle-6 .table-core { width: 44px; height: 44px; border-radius: 50%; }
        .layout-circle-6 .c-1 { top: 2px; left: 29px; } .layout-circle-6 .c-2 { top: 15px; right: 0px; } .layout-circle-6 .c-3 { bottom: 2px; left: 29px; }
        .layout-circle-6 .c-4 { bottom: 2px; right: 29px; } .layout-circle-6 .c-5 { top: 15px; left: 0px; } .layout-circle-6 .c-6 { top: 2px; right: 29px; }

        .layout-circle-4 .table-core { width: 38px; height: 38px; border-radius: 50%; }
        .layout-circle-4 .c-top { top: 2px; } .layout-circle-4 .c-bot { bottom: 2px; } .layout-circle-4 .c-left { left: 2px; } .layout-circle-4 .c-right { right: 2px; }

        .layout-rect-v-4 .table-core { width: 30px; height: 50px; border-radius: 4px; }
        .layout-rect-v-4 .c-l1 { left: 4px; top: 12px; } .layout-rect-v-4 .c-l2 { left: 4px; bottom: 12px; }
        .layout-rect-v-4 .c-r1 { right: 4px; top: 12px; } .layout-rect-v-4 .c-r2 { right: 4px; bottom: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Dining Roster</h2>
    <p style="font-size: 12px; color: #cbd5e1; margin: 0;">Format: <strong>Name, Party Size, Window (Y/N)</strong></p>
    <textarea id="bookingInput" placeholder="Soren Jensen, 4, Y&#10;Marni Larsen, 2, N"></textarea>
    <button onclick="executeSeating()">Allocate Tables</button>
    <div id="unseated" class="error-log"></div>
</div>

<div id="map-area">
    <div id="canvas"></div>
</div>

<script>
    let layout = JSON.parse(localStorage.getItem('shipDeckVisualMap')) || [];
    let activeAllocations = new Map();

    function initDeck() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';

        layout.forEach(t => {
            // Re-calculate capacity based on layout to ensure logic is safe
            let cap = 4;
            if(t.layout === 'square-2') cap = 2;
            if(t.layout === 'circle-6') cap = 6;
            t.cap = cap;

            const wrapper = document.createElement('div');
            wrapper.className = `table-wrapper layout-${t.layout} ${t.win ? 'is-window' : ''}`;
            wrapper.id = `table-${t.id}`;
            wrapper.style.left = t.x + 'px';
            wrapper.style.top = t.y + 'px';
            
            let chairHTML = '';
            if(t.layout === 'square-4' || t.layout === 'circle-4') chairHTML = `<div class="chair c-top"></div><div class="chair c-bot"></div><div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'square-2') chairHTML = `<div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'circle-6') chairHTML = `<div class="chair c-1"></div><div class="chair c-2"></div><div class="chair c-3"></div><div class="chair c-4"></div><div class="chair c-5"></div><div class="chair c-6"></div>`;
            else if (t.layout === 'rect-v-4') chairHTML = `<div class="chair c-l1"></div><div class="chair c-l2"></div><div class="chair c-r1"></div><div class="chair c-r2"></div>`;

            const booking = activeAllocations.get(t.id);
            if(booking) {
                wrapper.classList.add('occupied');
                wrapper.innerHTML = `${chairHTML}<div class="table-core">${t.id}<br><span class="guest-name">${booking.name}</span></div>`;
                wrapper.onclick = () => manualReassign(t.id);
            } else {
                wrapper.innerHTML = `${chairHTML}<div class="table-core">${t.id}</div>`;
            }
            canvas.appendChild(wrapper);
        });
    }

    function executeSeating() {
        activeAllocations.clear();
        const lines = document.getElementById('bookingInput').value.trim().split('\n');
        
        let guests = lines.map(line => {
            const parts = line.split(',');
            return { name: parts[0]?.trim(), size: parseInt(parts[1]), winReq: parts[2]?.trim().toUpperCase() === 'Y' };
        }).filter(g => g.name && !isNaN(g.size));

        guests.sort((a, b) => (b.winReq - a.winReq) || (b.size - a.size));
        let failedToSeat = [];

        guests.forEach(guest => {
            let match = layout.find(t => !activeAllocations.has(t.id) && t.cap >= guest.size && (guest.winReq ? t.win : true));
            if (!match && guest.winReq) match = layout.find(t => !activeAllocations.has(t.id) && t.cap >= guest.size);

            if (match) activeAllocations.set(match.id, guest);
            else failedToSeat.push(`${guest.name} (${guest.size})`);
        });

        const errorPanel = document.getElementById('unseated');
        if (failedToSeat.length > 0) {
            errorPanel.style.display = 'block';
            errorPanel.innerHTML = `<strong>Attention:</strong> Could not seat:<br>• ` + failedToSeat.join('<br>• ');
        } else {
            errorPanel.style.display = 'none';
        }
        initDeck();
    }

    function manualReassign(currentTableId) {
        const guestData = activeAllocations.get(currentTableId);
        const newTarget = prompt(`Re-assign ${guestData.name}\nEnter new Table ID:`);
        if (!newTarget) return;

        const tableProfile = layout.find(t => t.id === newTarget);
        if (!tableProfile) return alert(`Table ${newTarget} does not exist.`);
        if (activeAllocations.has(newTarget)) return alert(`Table is occupied.`);

        activeAllocations.delete(currentTableId);
        activeAllocations.set(newTarget, guestData);
        initDeck();
    }

    initDeck();
</script>
</body>
</html>
