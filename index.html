<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ship Dining Allocator</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; background: #f0f2f5; }
        
        /* Sidebar */
        #sidebar { width: 350px; background: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; }
        textarea { width: 100%; height: 200px; padding: 10px; box-sizing: border-box; font-family: monospace; }
        button { background: #004a99; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #003366; }
        .error { color: #d9534f; font-size: 14px; font-weight: bold; }

        /* Map Area */
        #map-area { flex-grow: 1; overflow: auto; padding: 40px; position: relative; }
        
        /* Table Styles (Matching Admin) */
        .table { position: absolute; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; text-align: center; flex-direction: column; transition: 0.2s; background: #e2e3e5; width: 50px; height: 50px; }
        .window { border: 3px solid #00a8ff; }
        .table.occupied { background: #d1e7dd; border-color: #0f5132; color: #0f5132; cursor: pointer; }
        .table.occupied:hover { transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Restaurant Bookings</h2>
    <p style="font-size: 14px; color: #666;">Format: <strong>Name, Guests, Window (Y/N)</strong><br>Example: <i>John Doe, 4, Y</i></p>
    <textarea id="bookingInput" placeholder="Soren, 4, Y&#10;Marni, 2, N"></textarea>
    <button onclick="allocateTables()">Allocate Tables</button>
    <div id="unseated" class="error"></div>
</div>

<div id="map-area">
    <!-- Tables inject here -->
</div>

<script>
    // Load layout saved from admin.html
    let layout = JSON.parse(localStorage.getItem('shipLayout')) || [];
    let allocations = new Map();

    function initMap() {
        const mapArea = document.getElementById('map-area');
        mapArea.innerHTML = '';
        
        if(layout.length === 0) {
            mapArea.innerHTML = "<h3>No map found. Please build one in admin.html first.</h3>";
            return;
        }

        layout.forEach(t => {
            const el = document.createElement('div');
            el.className = `table ${t.win ? 'window' : ''}`;
            el.id = `table-${t.id}`;
            el.style.left = t.x + 'px';
            el.style.top = t.y + 'px';
            
            const booking = allocations.get(t.id);
            if(booking) {
                el.classList.add('occupied');
                el.innerHTML = `${t.id}<br><small>${booking.name}</small>`;
                el.title = `Click to move ${booking.name}`;
                el.onclick = () => moveBooking(t.id);
            } else {
                el.innerHTML = `${t.id}<br><small>(${t.cap})</small>`;
            }
            
            mapArea.appendChild(el);
        });
    }

    function allocateTables() {
        allocations.clear(); // Reset
        const rawText = document.getElementById('bookingInput').value;
        const lines = rawText.split('\n').filter(l => l.trim() !== '');
        
        let bookings = lines.map(line => {
            const parts = line.split(',');
            return {
                name: parts[0]?.trim(),
                qty: parseInt(parts[1]),
                win: parts[2]?.trim().toUpperCase() === 'Y'
            };
        }).filter(b => b.name && !isNaN(b.qty));

        // Priority 1: Window requests. Priority 2: Group size (largest first)
        bookings.sort((a, b) => (b.win - a.win) || (b.qty - a.qty));

        let unseatedList = [];

        bookings.forEach(booking => {
            // Find a table that fits. 
            // If they want a window, try to find a window table first.
            let match = layout.find(t => 
                !allocations.has(t.id) && 
                t.cap >= booking.qty && 
                (booking.win ? t.win : true)
            );

            // Fallback: If no window table, just find ANY table that fits
            if (!match && booking.win) {
                match = layout.find(t => !allocations.has(t.id) && t.cap >= booking.qty);
            }

            if (match) {
                allocations.set(match.id, booking);
            } else {
                unseatedList.push(booking.name);
            }
        });

        document.getElementById('unseated').innerText = unseatedList.length 
            ? "Could not seat: " + unseatedList.join(', ') 
            : "";
            
        initMap();
    }

    function moveBooking(fromTableId) {
        const booking = allocations.get(fromTableId);
        const toTableId = prompt(`Where would you like to move ${booking.name}?\nEnter Table ID:`);
        
        if (!toTableId) return;

        // Check if table exists
        const targetTable = layout.find(t => t.id === toTableId);
        if (!targetTable) {
            alert("Table ID does not exist.");
            return;
        }

        // Check if table is occupied
        if (allocations.has(toTableId)) {
            alert("That table is already occupied!");
            return;
        }

        // Check if it fits
        if (targetTable.cap < booking.qty) {
            const force = confirm(`Warning: Table ${toTableId} only has ${targetTable.cap} seats, but the group has ${booking.qty} people. Move anyway?`);
            if(!force) return;
        }

        // Execute Move
        allocations.delete(fromTableId);
        allocations.set(toTableId, booking);
        initMap();
    }

    // Initialize
    initMap();
</script>
</body>
</html>
