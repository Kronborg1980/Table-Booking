<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skansagadur - Deck Architect</title>
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #0ea5e9;
            --accent-hover: #38bdf8;
            --surface: #e2e8f0;
            --chair: #64748b;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex;
            background: url('https://www.smyrilline.dk/wp-content/uploads/2025/04/Norrona.jpg') center/cover fixed no-repeat;
            color: var(--text); overflow: hidden;
        }

        /* Glass Sidebar */
        #sidebar {
            width: 320px; background: var(--glass-bg); backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
            padding: 20px; z-index: 50; box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; margin: 0 0 20px 0; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); font-size: 24px; letter-spacing: 1px; }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; font-weight: 600; }
        input, select {
            width: 100%; box-sizing: border-box; padding: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); color: white; border-radius: 6px; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        option { background: #0f172a; color: white; }

        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        .btn-add { background: var(--accent); color: #0f172a; }
        .btn-add:hover { background: var(--accent-hover); box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }
        .btn-save { background: #10b981; color: white; margin-top: 20px; }
        .btn-save:hover { background: #34d399; }
        .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-clear:hover { background: var(--danger); color: white; }

        /* HUD Stats */
        .hud {
            background: rgba(0,0,0,0.4); border-radius: 8px; padding: 15px; margin-top: auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; border: 1px solid var(--glass-border);
        }
        .hud-val { font-size: 24px; font-weight: bold; color: var(--accent); }
        .hud-label { font-size: 10px; text-transform: uppercase; color: #cbd5e1; }

        /* Workspace */
        #workspace { flex-grow: 1; position: relative; overflow: auto; background: rgba(15, 23, 42, 0.6); }
        #canvas {
            width: 2000px; height: 1500px; position: relative;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Dynamic Table Nodes */
        .table-node {
            position: absolute; display: flex; align-items: center; justify-content: center;
            cursor: grab; user-select: none; transform-origin: center center;
        }
        .table-node:active { cursor: grabbing; z-index: 100; }
        
        .surface {
            background: var(--surface); color: #0f172a; border: 2px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; z-index: 10; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }
        .is-window .surface { border-color: var(--accent); box-shadow: 0 0 15px rgba(14,165,233,0.5); }
        
        .chair {
            position: absolute; background: var(--chair); border: 1px solid #334155;
            border-radius: 50%; width: 14px; height: 14px; z-index: 5;
        }

        /* Node Hover Menu */
        .node-menu {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); padding: 5px; border-radius: 6px; display: none;
            gap: 5px; z-index: 20; border: 1px solid var(--glass-border);
        }
        .table-node:hover .node-menu { display: flex; }
        .node-btn { background: #334155; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .node-btn:hover { background: var(--accent); }
        .node-btn-del:hover { background: var(--danger); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Fleet Architect</h2>
    
    <div class="control-group">
        <label>Table ID (Auto-Increments)</label>
        <input type="text" id="t-id" placeholder="e.g., 60">
    </div>

    <div class="control-group">
        <label>Configuration (Face-to-Face)</label>
        <select id="t-config">
            <option value="square|2">Square - 2 Seats (1v1)</option>
            <option value="square|4" selected>Square - 4 Seats (2v2)</option>
            <option value="rect|6">Rectangle - 6 Seats (3v3)</option>
            <option value="round|4">Round - 4 Seats</option>
            <option value="round|6">Round - 6 Seats</option>
            <option value="round|8">Round - 8 Seats</option>
        </select>
    </div>

    <div class="control-group">
        <label>Window Priority Seating?</label>
        <select id="t-win">
            <option value="false">Standard Core</option>
            <option value="true">Window View (Priority)</option>
        </select>
    </div>

    <button class="btn-add" onclick="addTable()">Deploy Table To Deck</button>
    
    <div style="flex-grow: 1;"></div> <!-- Spacer -->

    <div class="hud">
        <div>
            <div class="hud-val" id="stat-tables">0</div>
            <div class="hud-label">Total Tables</div>
        </div>
        <div>
            <div class="hud-val" id="stat-pax">0</div>
            <div class="hud-label">Max Pax</div>
        </div>
    </div>

    <button class="btn-save" onclick="saveDeck()">💾 Commit To Manifest</button>
    <button class="btn-clear" onclick="wipeDeck()">⚠️ Purge Deck</button>
</div>

<div id="workspace">
    <div id="canvas"></div>
</div>

<script>
    let deck = JSON.parse(localStorage.getItem('skansagadur_manifest_2025')) || [];
    const canvas = document.getElementById('canvas');
    let dragObj = null, offsetX = 0, offsetY = 0;

    function renderDeck() {
        canvas.innerHTML = '';
        let totalPax = 0;

        deck.forEach(t => {
            totalPax += t.seats;
            const node = document.createElement('div');
            node.className = `table-node ${t.win ? 'is-window' : ''}`;
            node.id = `t-${t.id}`;
            node.style.left = `${t.x}px`;
            node.style.top = `${t.y}px`;
            
            // Mathematical Geometry Renderer
            let surfaceW, surfaceH, br;
            let chairsHTML = '';

            if (t.shape === 'square' || t.shape === 'rect') {
                br = '6px';
                if (t.seats === 2) { surfaceW = 40; surfaceH = 40; }
                if (t.seats === 4) { surfaceW = 56; surfaceH = 50; }
                if (t.seats === 6) { surfaceW = 80; surfaceH = 50; }

                // Calculate Face-to-Face Chairs (Top and Bottom edges)
                const chairSpacing = 22; 
                const startX = (surfaceW - (t.seats/2 * chairSpacing)) / 2 + 4;

                for(let i=0; i < t.seats/2; i++) {
                    const cx = startX + (i * chairSpacing);
                    // Top Row
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:-8px;"></div>`;
                    // Bottom Row
                    chairsHTML += `<div class="chair" style="left:${cx}px; bottom:-8px;"></div>`;
                }
            } else if (t.shape === 'round') {
                br = '50%';
                surfaceW = t.seats === 8 ? 70 : (t.seats === 6 ? 60 : 50);
                surfaceH = surfaceW;
                
                // Radial Distribution
                const radius = (surfaceW / 2) + 4;
                const center = (surfaceW / 2) - 7; // -7 centers the 14px chair

                for(let i=0; i < t.seats; i++) {
                    const angle = (i * (360 / t.seats)) * (Math.PI / 180);
                    const cx = center + radius * Math.cos(angle);
                    const cy = center + radius * Math.sin(angle);
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:${cy}px;"></div>`;
                }
            }

            node.style.width = `${surfaceW}px`;
            node.style.height = `${surfaceH}px`;
            node.style.transform = `rotate(${t.rotation || 0}deg)`;

            node.innerHTML = `
                ${chairsHTML}
                <div class="surface" style="width:100%; height:100%; border-radius:${br};">
                    <span style="transform: rotate(-${t.rotation || 0}deg); display:flex; flex-direction:column; align-items:center;">
                        ${t.id}<span style="font-size:9px; font-weight:normal;">${t.seats}px</span>
                    </span>
                </div>
                <div class="node-menu" style="transform: translateX(-50%) rotate(-${t.rotation || 0}deg);">
                    <button class="node-btn" onmousedown="rotateTable('${t.id}', event)">↻ Rotate</button>
                    <button class="node-btn node-btn-del" onmousedown="deleteTable('${t.id}', event)">✕</button>
                </div>
            `;
            
            node.addEventListener('mousedown', startDrag);
            canvas.appendChild(node);
        });

        // Update HUD
        document.getElementById('stat-tables').innerText = deck.length;
        document.getElementById('stat-pax').innerText = totalPax;
    }

    function addTable() {
        const idInput = document.getElementById('t-id');
        let id = idInput.value.trim();
        if(!id) return alert("Table ID is required.");
        if(deck.find(x => x.id === id)) return alert("Table ID already exists.");

        const config = document.getElementById('t-config').value.split('|');
        const shape = config[0];
        const seats = parseInt(config[1]);
        const win = document.getElementById('t-win').value === 'true';

        deck.push({ id, shape, seats, win, x: 200, y: 200, rotation: 0 });
        
        // Auto-increment logic
        let numVal = parseInt(id.replace(/\D/g, ''));
        if(!isNaN(numVal)) {
            idInput.value = id.replace(numVal, numVal + 1);
        } else {
            idInput.value = '';
        }

        renderDeck();
    }

    function rotateTable(id, e) {
        e.stopPropagation();
        let t = deck.find(x => x.id === id);
        if(t) t.rotation = ((t.rotation || 0) + 90) % 360;
        renderDeck();
    }

    function deleteTable(id, e) {
        e.stopPropagation();
        deck = deck.filter(x => x.id !== id);
        renderDeck();
    }

    function saveDeck() {
        localStorage.setItem('skansagadur_manifest_2025', JSON.stringify(deck));
        alert("Deck configuration committed to local storage.");
    }

    function wipeDeck() {
        if(confirm("DANGER: This purges the entire deck layout. Proceed?")) {
            deck = [];
            localStorage.removeItem('skansagadur_manifest_2025');
            renderDeck();
        }
    }

    // Canvas Dragging Engine
    function startDrag(e) {
        if(e.target.tagName === 'BUTTON') return;
        dragObj = e.currentTarget;
        offsetX = e.clientX - dragObj.getBoundingClientRect().left;
        offsetY = e.clientY - dragObj.getBoundingClientRect().top;
        
        // Compensate for workspace scroll position
        const workspace = document.getElementById('workspace');
        offsetX += workspace.scrollLeft;
        offsetY += workspace.scrollTop;
    }

    document.addEventListener('mousemove', (e) => {
        if(dragObj) {
            const workspace = document.getElementById('workspace');
            let newX = e.clientX - offsetX + workspace.scrollLeft;
            let newY = e.clientY - offsetY + workspace.scrollTop;
            
            // 10px Grid Snap
            newX = Math.round(newX / 10) * 10;
            newY = Math.round(newY / 10) * 10;

            dragObj.style.left = `${newX}px`;
            dragObj.style.top = `${newY}px`;
        }
    });

    document.addEventListener('mouseup', () => {
        if(dragObj) {
            const id = dragObj.id.replace('t-', '');
            const t = deck.find(x => x.id === id);
            if(t) {
                t.x = parseInt(dragObj.style.left);
                t.y = parseInt(dragObj.style.top);
            }
            dragObj = null;
        }
    });

    renderDeck();
</script>
</body>
</html>
