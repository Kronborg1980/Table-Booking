<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ship Layout Admin Builder</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; background: #e0e0e0; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: #2f3542; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10; }
        input, select, button { padding: 8px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        
        /* Canvas */
        #canvas-wrapper { flex-grow: 1; overflow: auto; padding: 40px; }
        #canvas { position: relative; width: 1200px; height: 1000px; background: white; border: 2px dashed #7f8c8d; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Table Styling */
        .table { position: absolute; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; background: #f1c40f; cursor: grab; user-select: none; flex-direction: column; }
        .table:active { cursor: grabbing; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; }
        .window { border: 3px solid #00a8ff; background: #dff9ff; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 18px; cursor: pointer; font-size: 12px; display: none; }
        .table:hover .delete-btn { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Table Builder</h2>
    
    <div>
        <label>Table ID (e.g., 60)</label>
        <input type="text" id="t-id" placeholder="Table Number">
    </div>
    
    <div>
        <label>Capacity (Chairs)</label>
        <input type="number" id="t-cap" value="4" min="1">
    </div>

    <div>
        <label>Is it a Window Table?</label>
        <select id="t-win">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
    </div>

    <button onclick="addTable()">Add Table to Map</button>
    
    <hr style="width: 100%; border-color: #555;">
    
    <button class="btn-success" onclick="saveLayout()">Save Layout</button>
    <button class="btn-danger" onclick="clearLayout()">Clear All</button>
    <div id="status" style="color: #2ecc71; font-size: 14px; text-align: center;"></div>
</div>

<div id="canvas-wrapper">
    <div id="canvas"></div>
</div>

<script>
    let layout = JSON.parse(localStorage.getItem('shipLayout')) || [];
    const canvas = document.getElementById('canvas');

    // Dragging state
    let isDragging = false;
    let currentElement = null;
    let offsetX = 0, offsetY = 0;

    function renderLayout() {
        canvas.innerHTML = '';
        layout.forEach(t => {
            const el = document.createElement('div');
            el.className = `table ${t.win ? 'window' : ''}`;
            el.id = `table-${t.id}`;
            el.style.width = '50px';
            el.style.height = '50px';
            el.style.left = t.x + 'px';
            el.style.top = t.y + 'px';
            
            el.innerHTML = `
                ${t.id}<br><small>(${t.cap})</small>
                <div class="delete-btn" onclick="deleteTable('${t.id}')">X</div>
            `;
            
            // Mouse events for dragging
            el.addEventListener('mousedown', dragStart);
            canvas.appendChild(el);
        });
    }

    function addTable() {
        const id = document.getElementById('t-id').value;
        const cap = parseInt(document.getElementById('t-cap').value);
        const win = document.getElementById('t-win').value === 'true';

        if (!id) return alert("Please enter a Table ID");
        if (layout.find(t => t.id === id)) return alert("Table ID already exists!");

        // Add to center of canvas
        layout.push({ id, cap, win, x: 100, y: 100 });
        renderLayout();
    }

    function deleteTable(id) {
        layout = layout.filter(t => t.id !== id);
        renderLayout();
    }

    function saveLayout() {
        localStorage.setItem('shipLayout', JSON.stringify(layout));
        const status = document.getElementById('status');
        status.innerText = "Layout Saved!";
        setTimeout(() => status.innerText = "", 2000);
    }

    function clearLayout() {
        if(confirm("Are you sure? This will delete the entire map.")) {
            layout = [];
            localStorage.removeItem('shipLayout');
            renderLayout();
        }
    }

    // Drag & Drop Logic
    function dragStart(e) {
        if(e.target.classList.contains('delete-btn')) return;
        isDragging = true;
        currentElement = e.currentTarget;
        offsetX = e.clientX - currentElement.offsetLeft;
        offsetY = e.clientY - currentElement.offsetTop;
    }

    document.addEventListener('mousemove', (e) => {
        if (isDragging && currentElement) {
            let newX = e.clientX - offsetX;
            let newY = e.clientY - offsetY;
            currentElement.style.left = newX + 'px';
            currentElement.style.top = newY + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (isDragging && currentElement) {
            // Update the layout array with new coordinates
            const id = currentElement.id.replace('table-', '');
            const tableData = layout.find(t => t.id === id);
            if(tableData) {
                tableData.x = parseInt(currentElement.style.left);
                tableData.y = parseInt(currentElement.style.top);
            }
            isDragging = false;
            currentElement = null;
        }
    });

    // Initialize
    renderLayout();
</script>
</body>
</html>
