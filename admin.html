<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deck Architect</title>
    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.9);
            --border-glass: rgba(255, 255, 255, 0.2);
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #10b981;
            --table-bg: #e2e8f0;
            --chair-bg: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; height: 100vh; display: flex;
            background: #1e293b; /* Solid dark background for reliability */
            color: #f8fafc; overflow: hidden;
        }

        #sidebar {
            width: 320px; background: var(--bg-glass);
            border-right: 1px solid var(--border-glass); padding: 25px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }

        h2 { margin: 0; font-size: 20px; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; text-transform: uppercase; color: #cbd5e1; }
        input, select { background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass); color: white; padding: 10px; border-radius: 6px; }
        option { background: #0f172a; color: white; }

        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 5px; }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

        #canvas-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #0f172a; }
        
        #canvas {
            width: 1000px; height: 850px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; position: relative;
            background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 20px 20px;
        }

        /* Table & Chair CSS */
        .table-wrapper { position: absolute; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; cursor: grab; user-select: none; }
        .table-wrapper:active { cursor: grabbing; z-index: 100; transform: scale(1.05); }

        .table-core {
            background: var(--table-bg); color: #0f172a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 12px; font-weight: bold;
            z-index: 2; border: 2px solid #334155; text-align: center; line-height: 1.2;
        }
        .is-window .table-core { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .chair { position: absolute; background: var(--chair-bg); border: 1px solid #475569; border-radius: 50%; width: 14px; height: 14px; z-index: 1; }

        .layout-square-4 .table-core { width: 40px; height: 40px; border-radius: 4px; }
        .layout-square-4 .c-top { top: 0px; } .layout-square-4 .c-bot { bottom: 0px; } .layout-square-4 .c-left { left: 0px; } .layout-square-4 .c-right { right: 0px; }

        .layout-square-2 .table-core { width: 36px; height: 36px; border-radius: 4px; }
        .layout-square-2 .c-left { left: 2px; } .layout-square-2 .c-right { right: 2px; }

        .layout-circle-6 .table-core { width: 46px; height: 46px; border-radius: 50%; }
        .layout-circle-6 .c-1 { top: 0px; left: 28px; } .layout-circle-6 .c-2 { top: 14px; right: -2px; } .layout-circle-6 .c-3 { bottom: 0px; left: 28px; }
        .layout-circle-6 .c-4 { bottom: 0px; right: 28px; } .layout-circle-6 .c-5 { top: 14px; left: -2px; } .layout-circle-6 .c-6 { top: 0px; right: 28px; }

        .delete-btn { position: absolute; top: 0; right: 0; background: var(--danger); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; opacity: 0; z-index: 10; }
        .table-wrapper:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Deck Architect</h2>
    
    <div class="input-group">
        <label>Table ID Number</label>
        <input type="text" id="t-id" placeholder="e.g. 60">
    </div>

    <div class="input-group">
        <label>Table Shape & Chairs</label>
        <select id="t-layout">
            <option value="square-4">Square (4 Seats)</option>
            <option value="square-2">Square (2 Seats)</option>
            <option value="circle-6">Round (6 Seats)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Window Priority?</label>
        <select id="t-win">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
    </div>

    <button class="btn-primary" onclick="addTable()">+ Add Table</button>
    <div style="height: 1px; background: var(--border-glass); margin: 10px 0;"></div>
    <button class="btn-success" onclick="saveLayout()">💾 Save Map</button>
    <button class="btn-danger" onclick="clearLayout()">⚠️ Clear Map</button>
</div>

<div id="canvas-wrapper">
    <div id="canvas"></div>
</div>

<script>
    let layout = JSON.parse(localStorage.getItem('shipDataMap2025')) || [];
    const canvas = document.getElementById('canvas');
    let isDragging = false, currentElement = null, offsetX = 0, offsetY = 0;

    function renderLayout() {
        canvas.innerHTML = '';
        layout.forEach(t => {
            const wrapper = document.createElement('div');
            wrapper.className = `table-wrapper layout-${t.layout} ${t.win ? 'is-window' : ''}`;
            wrapper.id = `table-${t.id}`;
            wrapper.style.left = t.x + 'px';
            wrapper.style.top = t.y + 'px';
            
            let chairHTML = '';
            if(t.layout === 'square-4') chairHTML = `<div class="chair c-top"></div><div class="chair c-bot"></div><div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'square-2') chairHTML = `<div class="chair c-left"></div><div class="chair c-right"></div>`;
            else if (t.layout === 'circle-6') chairHTML = `<div class="chair c-1"></div><div class="chair c-2"></div><div class="chair c-3"></div><div class="chair c-4"></div><div class="chair c-5"></div><div class="chair c-6"></div>`;

            wrapper.innerHTML = `
                ${chairHTML}
                <div class="table-core">
                    ${t.id}<br>
                    <span style="font-size: 9px; opacity: 0.8; font-weight: normal;">${t.cap} Seats</span>
                </div>
                <div class="delete-btn" onclick="deleteTable('${t.id}')">✕</div>
            `;
            wrapper.addEventListener('mousedown', dragStart);
            canvas.appendChild(wrapper);
        });
    }

    function addTable() {
        const id = document.getElementById('t-id').value;
        const layoutType = document.getElementById('t-layout').value;
        const win = document.getElementById('t-win').value === 'true';

        if (!id) return alert("Please enter a Table ID.");
        if (layout.find(t => t.id === id)) return alert("Table ID already exists.");

        // Explicitly extract the exact capacity from the layout selection
        let capacity = 4;
        if(layoutType === 'square-2') capacity = 2;
        if(layoutType === 'circle-6') capacity = 6;

        layout.push({ id: id, layout: layoutType, cap: capacity, win: win, x: 450, y: 400 });
        renderLayout();
    }

    function deleteTable(id) {
        layout = layout.filter(t => t.id !== id);
        renderLayout();
    }

    function saveLayout() {
        localStorage.setItem('shipDataMap2025', JSON.stringify(layout));
        alert("Success! Layout saved. Open index.html to assign guests.");
    }

    function clearLayout() {
        if(confirm("Are you sure? This deletes all tables.")) {
            layout = [];
            localStorage.removeItem('shipDataMap2025');
            renderLayout();
        }
    }

    // Drag Logic
    function dragStart(e) {
        if(e.target.classList.contains('delete-btn')) return;
        isDragging = true;
        currentElement = e.currentTarget;
        offsetX = e.clientX - currentElement.offsetLeft;
        offsetY = e.clientY - currentElement.offsetTop;
    }

    document.addEventListener('mousemove', (e) => {
        if (isDragging && currentElement) {
            let newX = Math.round((e.clientX - offsetX) / 5) * 5; 
            let newY = Math.round((e.clientY - offsetY) / 5) * 5;
            currentElement.style.left = newX + 'px';
            currentElement.style.top = newY + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (isDragging && currentElement) {
            const id = currentElement.id.replace('table-', '');
            const tableData = layout.find(t => t.id === id);
            if(tableData) {
                tableData.x = parseInt(currentElement.style.left);
                tableData.y = parseInt(currentElement.style.top);
            }
            isDragging = false;
            currentElement = null;
        }
    });

    renderLayout();
</script>
</body>
</html>
