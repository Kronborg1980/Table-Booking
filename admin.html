<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Layout Architect</title>
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            background: url('https://www.smyrilline.dk/wp-content/uploads/2025/04/Norrona.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Glassmorphism Sidebar */
        #sidebar {
            width: 340px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        h2 { margin: 0; font-size: 24px; font-weight: 300; letter-spacing: 1px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        
        input, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        option { background: #0f172a; color: white; }

        button {
            padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
        }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #34d399; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Canvas Area */
        #canvas-wrapper { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        
        #canvas {
            width: 900px; height: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Table Nodes */
        .table-node {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold;
            cursor: grab; user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .table-node:active { cursor: grabbing; transform: scale(1.05); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .shape-square { width: 50px; height: 50px; border-radius: 8px; }
        .shape-circle { width: 60px; height: 60px; border-radius: 50%; }
        .shape-rect-v { width: 40px; height: 70px; border-radius: 8px; }
        .shape-rect-h { width: 70px; height: 40px; border-radius: 8px; }

        .is-window { box-shadow: 0 0 0 4px var(--accent); }

        .delete-btn {
            position: absolute; top: -8px; right: -8px;
            background: var(--danger); color: white; border-radius: 50%;
            width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; cursor: pointer; opacity: 0; transition: 0.2s;
        }
        .table-node:hover .delete-btn { opacity: 1; }

        /* Grid Background */
        .grid-bg {
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Fleet Architect</h2>
    
    <div class="input-group">
        <label>Table ID</label>
        <input type="text" id="t-id" placeholder="e.g. 60">
    </div>
    
    <div class="input-group">
        <label>Capacity (Seats)</label>
        <input type="number" id="t-cap" value="4" min="1">
    </div>

    <div class="input-group">
        <label>Shape</label>
        <select id="t-shape">
            <option value="square">Square</option>
            <option value="circle">Circle</option>
            <option value="rect-h">Rectangle (Horizontal)</option>
            <option value="rect-v">Rectangle (Vertical)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Window Table?</label>
        <select id="t-win">
            <option value="false">No</option>
            <option value="true">Yes (Priority Seating)</option>
        </select>
    </div>

    <button class="btn-primary" onclick="addTable()">+ Add Table to Deck</button>
    
    <div style="height: 1px; background: var(--glass-border); margin: 10px 0;"></div>
    
    <button class="btn-success" onclick="saveLayout()">💾 Save Configuration</button>
    <button class="btn-primary" style="background: #4f46e5; color: white;" onclick="exportMap()">📤 Export Map File</button>
    <button class="btn-danger" onclick="clearLayout()">⚠️ Wipe Deck Plan</button>
    
    <div id="status" style="color: var(--success); font-size: 12px; text-align: center; height: 20px;"></div>
</div>

<div id="canvas-wrapper">
    <div id="canvas" class="grid-bg"></div>
</div>

<script>
    let layout = JSON.parse(localStorage.getItem('premiumShipLayout')) || [];
    const canvas = document.getElementById('canvas');
    let isDragging = false, currentElement = null, offsetX = 0, offsetY = 0;

    function renderLayout() {
        canvas.innerHTML = '';
        layout.forEach(t => {
            const el = document.createElement('div');
            el.className = `table-node shape-${t.shape} ${t.win ? 'is-window' : ''}`;
            el.id = `table-${t.id}`;
            el.style.left = t.x + 'px';
            el.style.top = t.y + 'px';
            
            el.innerHTML = `
                ${t.id}<br><span style="font-size:10px; font-weight:normal; opacity:0.7">${t.cap} seats</span>
                <div class="delete-btn" onclick="deleteTable('${t.id}')">✕</div>
            `;
            el.addEventListener('mousedown', dragStart);
            canvas.appendChild(el);
        });
    }

    function addTable() {
        const id = document.getElementById('t-id').value;
        const cap = parseInt(document.getElementById('t-cap').value);
        const shape = document.getElementById('t-shape').value;
        const win = document.getElementById('t-win').value === 'true';

        if (!id) return alert("Table ID required.");
        if (layout.find(t => t.id === id)) return alert("Table ID already exists.");

        layout.push({ id, cap, shape, win, x: 400, y: 350 });
        renderLayout();
    }

    function deleteTable(id) {
        layout = layout.filter(t => t.id !== id);
        renderLayout();
    }

    function saveLayout() {
        localStorage.setItem('premiumShipLayout', JSON.stringify(layout));
        showStatus("Deck configuration saved to browser!");
    }

    function exportMap() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(layout));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "skansagadur_deckplan.json");
        dlAnchorElem.click();
    }

    function clearLayout() {
        if(confirm("Are you certain? This wipes the entire map.")) {
            layout = [];
            localStorage.removeItem('premiumShipLayout');
            renderLayout();
        }
    }

    function showStatus(msg) {
        const status = document.getElementById('status');
        status.innerText = msg;
        setTimeout(() => status.innerText = "", 3000);
    }

    // Drag Logic (with 10px snap-to-grid)
    function dragStart(e) {
        if(e.target.classList.contains('delete-btn')) return;
        isDragging = true;
        currentElement = e.currentTarget;
        offsetX = e.clientX - currentElement.offsetLeft;
        offsetY = e.clientY - currentElement.offsetTop;
    }

    document.addEventListener('mousemove', (e) => {
        if (isDragging && currentElement) {
            let newX = Math.round((e.clientX - offsetX) / 10) * 10; // Snap to 10px grid
            let newY = Math.round((e.clientY - offsetY) / 10) * 10;
            currentElement.style.left = newX + 'px';
            currentElement.style.top = newY + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (isDragging && currentElement) {
            const id = currentElement.id.replace('table-', '');
            const tableData = layout.find(t => t.id === id);
            if(tableData) {
                tableData.x = parseInt(currentElement.style.left);
                tableData.y = parseInt(currentElement.style.top);
            }
            isDragging = false;
            currentElement = null;
        }
    });

    renderLayout();
</script>
</body>
</html>
