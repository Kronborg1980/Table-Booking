<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skansagarður - Bordplan Admin</title>
    <style>
        :root {
            /* Smyril Line Brand Colors */
            --smyril-navy: #002b5c;
            --smyril-red: #e3000f;
            --smyril-blue: #0056a3;
            
            --glass-bg: rgba(0, 43, 92, 0.90); /* Navy Glass */
            --glass-border: rgba(255, 255, 255, 0.15);
            --surface: #ffffff;
            --chair: #cbd5e1;
            --text: #f8fafc;
            --danger: #ff4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex;
            background: url('https://www.smyrilline.dk/wp-content/uploads/2025/04/Norrona.jpg') center/cover fixed no-repeat;
            color: var(--text); overflow: hidden;
        }

        #sidebar {
            width: 340px; background: var(--glass-bg); backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
            padding: 20px; z-index: 50; box-shadow: 5px 0 20px rgba(0,0,0,0.5); overflow-y: auto;
        }

        h2 { font-weight: 300; margin: 0 0 15px 0; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { font-size: 14px; color: var(--text); margin: 15px 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; text-transform: uppercase; }

        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: #cbd5e1; margin-bottom: 4px; font-weight: 600; }
        input, select {
            width: 100%; box-sizing: border-box; padding: 10px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border); color: white; border-radius: 4px; outline: none; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--smyril-red); background: rgba(255,255,255,0.15); }
        option { background: var(--smyril-navy); color: white; }

        .flex-row { display: flex; gap: 10px; }
        .flex-row input[type="color"] { padding: 2px; height: 38px; cursor: pointer; border-radius: 4px; }

        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; margin-top: 5px; font-size: 11px;
        }
        .btn-add { background: var(--smyril-red); color: white; }
        .btn-add:hover { background: #ff1a27; box-shadow: 0 0 10px rgba(227, 0, 15, 0.5); }
        .btn-save { background: var(--smyril-blue); color: white; margin-top: 20px; }
        .btn-save:hover { background: #006bcf; }
        .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-clear:hover { background: var(--danger); color: white; }

        .time-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px; margin: 4px 4px 0 0; font-size: 11px; border: 1px solid var(--glass-border); }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; }

        #workspace { flex-grow: 1; position: relative; overflow: auto; background: rgba(0, 43, 92, 0.4); }
        #canvas { width: 2000px; height: 1500px; position: relative; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; }

        .table-node { position: absolute; display: flex; align-items: center; justify-content: center; cursor: grab; user-select: none; transform-origin: center center; }
        .table-node:active { cursor: grabbing; z-index: 100; }
        
        .surface { background: var(--surface); color: var(--smyril-navy); border: 2px solid #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; z-index: 10; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .is-window .surface { border-color: var(--smyril-blue); box-shadow: 0 0 15px rgba(0, 86, 163, 0.6); }
        .chair { position: absolute; background: var(--chair); border: 1px solid #94a3b8; border-radius: 50%; width: 14px; height: 14px; z-index: 5; }

        .node-menu { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: var(--smyril-navy); padding: 5px; border-radius: 4px; display: none; gap: 5px; z-index: 20; border: 1px solid var(--glass-border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .table-node:hover .node-menu { display: flex; }
        .node-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 4px 8px; border-radius: 2px; cursor: pointer; font-size: 10px; text-transform: none; margin: 0; width: auto; font-weight: normal; }
        .node-btn:hover { background: var(--smyril-blue); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Skansagarður Admin</h2>
    
    <!-- Timeline Settings -->
    <h3>Buffet Spisetider</h3>
    <div class="control-group flex-row">
        <input type="time" id="s-time" value="18:30">
        <input type="color" id="s-color" value="#0056a3">
        <button class="btn-add" style="margin:0; width:auto; padding: 0 15px;" id="addShiftBtn">+</button>
    </div>
    <div id="shift-list" style="margin-bottom: 20px;"></div>

    <!-- Table Building -->
    <h3>Opret Borde</h3>
    <div class="control-group">
        <label>Bordnummer (Stiger auto.)</label>
        <input type="text" id="t-id" placeholder="F.eks. 60">
    </div>

    <div class="control-group">
        <label>Bordtype & Siddepladser</label>
        <select id="t-config">
            <option value="square|2">Smal - 2 Personer (1 mod 1)</option>
            <option value="square|4" selected>Firkantet - 4 Personer (2 mod 2)</option>
            <option value="rect|6">Aflangt - 6 Personer (3 mod 3)</option>
            <option value="round|4">Rundt - 4 Personer</option>
            <option value="round|6">Rundt - 6 Personer</option>
        </select>
    </div>

    <div class="control-group">
        <label>Vinduesplads (Prioritet)?</label>
        <select id="t-win">
            <option value="false">Nej - Standardplads</option>
            <option value="true">Ja - Vindue</option>
        </select>
    </div>

    <button class="btn-add" id="addTableBtn">Tilføj Bord</button>
    
    <div style="flex-grow: 1;"></div>

    <button class="btn-save" id="saveBtn">💾 Gem Bordplan</button>
    <button class="btn-clear" id="wipeBtn">⚠️ Ryd Hele Planen</button>
</div>

<div id="workspace">
    <div id="canvas"></div>
</div>

<script>
    let deck = JSON.parse(localStorage.getItem('skansagadur_manifest_2025')) || [];
    let settings = JSON.parse(localStorage.getItem('skansagadur_settings_2025')) || { shifts: [] };
    
    const canvas = document.getElementById('canvas');
    const shiftList = document.getElementById('shift-list');
    let dragObj = null, offsetX = 0, offsetY = 0;

    function renderShifts() {
        shiftList.innerHTML = '';
        settings.shifts.forEach((s, index) => {
            const badge = document.createElement('div');
            badge.className = 'time-badge';
            badge.innerHTML = `<div class="color-dot" style="background:${s.color}"></div> ${s.time} <span style="cursor:pointer; color:#ff4444;" data-index="${index}" class="del-shift">✕</span>`;
            shiftList.appendChild(badge);
        });

        document.querySelectorAll('.del-shift').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = e.target.getAttribute('data-index');
                settings.shifts.splice(idx, 1);
                renderShifts();
            });
        });
    }

    function renderDeck() {
        canvas.innerHTML = '';
        deck.forEach(t => {
            const node = document.createElement('div');
            node.className = `table-node ${t.win ? 'is-window' : ''}`;
            node.id = `t-${t.id}`;
            node.style.left = `${t.x}px`;
            node.style.top = `${t.y}px`;
            
            let surfaceW, surfaceH, br, chairsHTML = '';

            if (t.shape === 'square' || t.shape === 'rect') {
                br = '4px';
                if (t.seats === 2) { 
                    surfaceW = 26; surfaceH = 40; 
                } else if (t.seats === 4) { 
                    surfaceW = 56; surfaceH = 50; 
                } else if (t.seats === 6) { 
                    surfaceW = 80; surfaceH = 50; 
                }

                const spacing = 22; 
                const startX = (surfaceW - (t.seats/2 * spacing)) / 2 + 4;

                for(let i=0; i < t.seats/2; i++) {
                    const cx = startX + (i * spacing);
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:-8px;"></div><div class="chair" style="left:${cx}px; bottom:-8px;"></div>`;
                }
            } else if (t.shape === 'round') {
                br = '50%';
                surfaceW = t.seats === 6 ? 60 : 50;
                surfaceH = surfaceW;
                const radius = (surfaceW / 2) + 4;
                const center = (surfaceW / 2) - 7;

                for(let i=0; i < t.seats; i++) {
                    const angle = (i * (360 / t.seats)) * (Math.PI / 180);
                    const cx = center + radius * Math.cos(angle);
                    const cy = center + radius * Math.sin(angle);
                    chairsHTML += `<div class="chair" style="left:${cx}px; top:${cy}px;"></div>`;
                }
            }

            node.style.width = `${surfaceW}px`;
            node.style.height = `${surfaceH}px`;
            node.style.transform = `rotate(${t.rotation || 0}deg)`;

            node.innerHTML = `
                ${chairsHTML}
                <div class="surface" style="width:100%; height:100%; border-radius:${br};">
                    <span style="transform: rotate(-${t.rotation || 0}deg); display:flex; flex-direction:column; align-items:center;">
                        ${t.id}<span style="font-size:9px; font-weight:normal;">${t.seats} pers.</span>
                    </span>
                </div>
                <div class="node-menu" style="transform: translateX(-50%) rotate(-${t.rotation || 0}deg);">
                    <button class="node-btn rotate-btn" data-id="${t.id}">↻ Vend</button>
                    <button class="node-btn del-btn" style="background:#e3000f;" data-id="${t.id}">Slet</button>
                </div>
            `;
            
            node.addEventListener('mousedown', startDrag);
            canvas.appendChild(node);
        });

        document.querySelectorAll('.rotate-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                let t = deck.find(x => x.id === e.target.getAttribute('data-id'));
                if(t) t.rotation = ((t.rotation || 0) + 90) % 360;
                renderDeck();
            });
        });

        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                deck = deck.filter(x => x.id !== e.target.getAttribute('data-id'));
                renderDeck();
            });
        });
    }

    document.getElementById('addShiftBtn').addEventListener('click', () => {
        const time = document.getElementById('s-time').value;
        const color = document.getElementById('s-color').value;
        if(time && !settings.shifts.find(s => s.time === time)) {
            settings.shifts.push({ time, color });
            renderShifts();
        }
    });

    document.getElementById('addTableBtn').addEventListener('click', () => {
        const idInput = document.getElementById('t-id');
        let id = idInput.value.trim();
        if(!id || deck.find(x => x.id === id)) return alert("Ugyldigt eller allerede brugt bordnummer.");

        const config = document.getElementById('t-config').value.split('|');
        deck.push({ id, shape: config[0], seats: parseInt(config[1]), win: document.getElementById('t-win').value === 'true', x: 200, y: 200, rotation: 0 });
        
        let numVal = parseInt(id.replace(/\D/g, ''));
        if(!isNaN(numVal)) idInput.value = id.replace(numVal, numVal + 1);
        renderDeck();
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
        localStorage.setItem('skansagadur_manifest_2025', JSON.stringify(deck));
        localStorage.setItem('skansagadur_settings_2025', JSON.stringify(settings));
        alert("Bordplan og indstillinger er gemt lokalt!");
    });

    document.getElementById('wipeBtn').addEventListener('click', () => {
        if(confirm("ADVARSEL: Dette vil slette hele bordplanen. Vil du fortsætte?")) {
            deck = [];
            localStorage.removeItem('skansagadur_manifest_2025');
            renderDeck();
        }
    });

    function startDrag(e) {
        if (e.target.closest('.node-menu') || e.target.tagName === 'BUTTON') return;
        dragObj = e.currentTarget;
        const rect = dragObj.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    }

    document.addEventListener('mousemove', (e) => {
        if (dragObj) {
            const canvasRect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - canvasRect.left;
            let mouseY = e.clientY - canvasRect.top;
            
            let newX = Math.round((mouseX - offsetX) / 10) * 10;
            let newY = Math.round((mouseY - offsetY) / 10) * 10;

            dragObj.style.left = `${newX}px`;
            dragObj.style.top = `${newY}px`;
        }
    });

    document.addEventListener('mouseup', () => {
        if(dragObj) {
            const id = dragObj.id.replace('t-', '');
            const t = deck.find(x => x.id === id);
            if(t) { t.x = parseInt(dragObj.style.left); t.y = parseInt(dragObj.style.top); }
            dragObj = null;
        }
    });

    renderShifts();
    renderDeck();
</script>
</body>
</html>
